<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eros - Tier List</title>

    <link rel="stylesheet" href="../../shared-shell.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <section class="card">
            <div class="card-header">
                <i class="fas fa-ranking-star"></i>
                <h2>Tier List</h2>
            </div>

            <!--
                Cells are empty; units are placed via tierlist.json.
                Each entry there is { "row", "column", "name" } — edit that
                file to sort units or swap their positions. The card's image
                and link are pulled automatically from characters.json by
                matching the "name" (a character's name or id).
            -->
            <div class="tierlist">
                <!-- Column headers -->
                <div class="corner"></div>
                <div class="col-head">Damage</div>
                <div class="col-head">Tank</div>
                <div class="col-head">Support</div>

                <!-- SS -->
                <div class="tier-label tier-ss">SS</div>
                <div class="tier-cell" data-row="SS" data-col="Damage"></div>
                <div class="tier-cell" data-row="SS" data-col="Tank"></div>
                <div class="tier-cell" data-row="SS" data-col="Support"></div>

                <!-- S -->
                <div class="tier-label tier-s">S</div>
                <div class="tier-cell" data-row="S" data-col="Damage"></div>
                <div class="tier-cell" data-row="S" data-col="Tank"></div>
                <div class="tier-cell" data-row="S" data-col="Support"></div>

                <!-- A -->
                <div class="tier-label tier-a">A</div>
                <div class="tier-cell" data-row="A" data-col="Damage"></div>
                <div class="tier-cell" data-row="A" data-col="Tank"></div>
                <div class="tier-cell" data-row="A" data-col="Support"></div>

                <!-- B -->
                <div class="tier-label tier-b">B</div>
                <div class="tier-cell" data-row="B" data-col="Damage"></div>
                <div class="tier-cell" data-row="B" data-col="Tank"></div>
                <div class="tier-cell" data-row="B" data-col="Support"></div>

                <!-- D -->
                <div class="tier-label tier-d">D</div>
                <div class="tier-cell" data-row="D" data-col="Damage"></div>
                <div class="tier-cell" data-row="D" data-col="Tank"></div>
                <div class="tier-cell" data-row="D" data-col="Support"></div>
            </div>
        </section>
    </main>

    <script src="../../navigation.js"></script>
    <script>
        loadShell("Tier List", "none");

        const TIERLIST_URL = '/EROS/Characters/Tierlist/tierlist.json';
        const CHARACTERS_URL = '/EROS/Characters/characters.json';

        async function loadTierlist() {
            let placements, roster;
            try {
                [placements, roster] = await Promise.all([
                    fetch(TIERLIST_URL).then(r => r.json()),
                    fetch(CHARACTERS_URL).then(r => r.json())
                ]);
            } catch (e) {
                return; // leave the grid empty if data can't be loaded
            }

            // Index the cells by "row|col" so placements can find their home.
            const cells = {};
            document.querySelectorAll('.tier-cell').forEach(cell => {
                cells[`${cell.dataset.row}|${cell.dataset.col}`] = cell;
            });

            placements.forEach(p => {
                const cell = cells[`${p.row}|${p.column}`];
                if (!cell) return;

                // Resolve the unit from characters.json by name or id.
                const char = roster.find(c => c.name === p.name || c.id === p.name);
                const id = char ? char.id : '';
                const image = char && char.image ? char.image : '';
                const label = char ? char.name : p.name;

                const card = document.createElement('a');
                card.className = 'unit-card';
                card.href = id ? `/EROS/Characters/Unit/index.html?id=${encodeURIComponent(id)}` : '#';
                if (image) card.style.backgroundImage = `url('${image}')`;
                card.innerHTML =
                    (image ? '' : '<i class="fas fa-user card-ph"></i>') +
                    `<span class="unit-details">${label}</span>`;

                cell.appendChild(card);
            });
        }

        loadTierlist();
    </script>
</body>
</html>
