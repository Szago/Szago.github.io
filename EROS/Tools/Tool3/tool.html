<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eros Tools - Silver Income</title>
    
    <link rel="stylesheet" href="..\..\shared-shell.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    

    
    <main class="main-content">
        

        <div class="dashboard-grid">
            <section class="card setup-card">
                <div class="card-header">
                    <i class="fas fa-edit"></i>
                    <h2>Base Statistics</h2>
                </div>
                <div class="input-group">
                    <label>Idle Silver (per minute)</label>
                    <input type="number" id="idleSilver" min="0" step="any" placeholder="Enter amount..." oninput="calculateIncome()">
                </div>
                
                <div class="input-group">
                    <div style="display:flex; justify-content:space-between;">
                        <label>Daily Rushes</label>
                        <span id="rushesDisplay" class="accent-text">0</span>
                    </div>
                    <input type="range" id="rushes" min="0" max="3" value="0" oninput="calculateIncome(); updateRushesDisplay();">
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="abbreviateCheckbox" onchange="calculateIncome()" checked>
                    <label for="abbreviateCheckbox">Abbreviate Numbers (K/M)</label>
                </div>
            </section>

            <section class="results-container-grid">
                <div class="card income-card">
                    <label>Hourly</label>
                    <div id="incomeHour" class="value primary">0</div>
                </div>
                <div class="card income-card">
                    <label>Daily</label>
                    <div id="incomeDay" class="value primary">0</div>
                </div>
                <div class="card income-card">
                    <label>Weekly</label>
                    <div id="incomeWeek" class="value primary">0</div>
                </div>
                <div class="card income-card">
                    <label>Monthly</label>
                    <div id="incomeMonth" class="value primary">0</div>
                </div>
                <div class="card income-card full-width">
                    <label>Yearly Projected Income</label>
                    <div id="incomeYear" class="value large-accent">0</div>
                </div>
            </section>
        </div>
    </main>
    <script src="..\..\navigation.js"></script>
    <script>
        // Simply call the shell loader!
        loadShell("Silver Income", "none", "Nothing to announce.");
    </script>

    <script src="script.js"></script>
</body>
</html>
