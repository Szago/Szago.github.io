<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eros Tools - Shard Simulation</title>
    <link rel="stylesheet" href="..\..\shared-shell.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <div class="dashboard-grid">
            <section class="card setup-card">
                <div class="card-header">
                    <i class="fas fa-dice"></i>
                    <h2>Probability Settings</h2>
                </div>
                
                <div class="preset-row">
                    <button class="btn-preset" onclick="loadPreset('blank')">Blank</button>
                    <button class="btn-preset" onclick="loadPreset('legendary')">Legendary Gacha</button>
                    <button class="btn-preset empty" onclick="loadPreset('empty2')">Empty 2</button>
                    <button class="btn-preset empty" onclick="loadPreset('empty3')">Empty 3</button>
                </div>

                <div class="input-grid-mini">
                    <div class="input-group">
                        <label>5 Shards Odds</label>
                        <input type="number" id="shardOdds5" value="0.0652" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label>10 Shards Odds</label>
                        <input type="number" id="shardOdds10" value="0.0000" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label>15 Shards Odds</label>
                        <input type="number" id="shardOdds15" value="0.0000" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label>25 Shards Odds</label>
                        <input type="number" id="shardOdds25" value="0.0000" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label>50 Shards Odds</label>
                        <input type="number" id="shardOdds50" value="0.0000" step="0.0001">
                    </div>
                    <div class="input-group">
                        <label>75 Shards Odds</label>
                        <input type="number" id="shardOdds75" value="0.0000" step="0.0001">
                    </div>
                </div>
            </section>

                  <section class="card control-card">
            <div class="card-header">
                <i class="fas fa-microchip"></i>
                <h2>Simulation Mode</h2>
            </div>

            <div class="mode-toggle-group">
                <label class="radio-container">
                    <input type="radio" name="mode" value="target" checked onchange="toggleMode()">
                    <span class="checkmark"></span> Target Shards
                </label>
                <label class="radio-container">
                    <input type="radio" name="mode" value="fixed" onchange="toggleMode()">
                    <span class="checkmark"></span> Fixed Chests
                </label>
            </div>

            <div class="input-row-compact">
                <div id="targetMode" class="input-group">
                    <label>Total Shards Desired</label>
                    <input type="number" id="totalShards" value="100">
                </div>

                <div id="fixedMode" class="input-group" style="display: none;">
                    <label>Chests to Open</label>
                    <input type="number" id="chestsToOpen" value="100">
                </div>

                <div class="input-group">
                    <label>Simulations (10k+)</label>
                    <input type="number" id="numSimulations" value="10000">
                </div>
            </div>

            <button class="btn-simulate" onclick="simulate()">
                <i class="fas fa-play"></i> Run Simulation
            </button>
        </section>

            <section class="card result-card-full">
                <div class="result-display">
                    <label>Expected Outcome</label>
                    <div id="result" class="large-value">Ready to simulate...</div>
                </div>
            </section>
        </div>
    </main>

    <script src="..\..\navigation.js"></script>
    <script src="script.js"></script>
    <script>
        loadShell("Shard Simulation", "none");
        
        // Clock Interval logic inside the page
        setInterval(function() {
            const currentDate = new Date();
            document.getElementById('current-date').value = currentDate.toISOString().slice(0, 16);
        }, 1000);
    </script>
</body>
</html>
