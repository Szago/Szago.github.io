<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eros Tools - Level Calculator</title>
    <link rel="stylesheet" href="../../shared-shell.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
</head>
<body>
    <main class="main-content">
        <div class="dashboard-grid">
            
            <section class="card control-panel">
                <div class="card-header">
                    <i class="fas fa-sliders-h"></i>
                    <h2>Calculation Settings</h2>
                </div>

                <div class="mode-tabs">
                    <button id="btnSimple" class="tab active" onclick="setMode('simple')">Simple</button>
                    <button id="btnRange" class="tab" onclick="setMode('range')">Range Mode</button>
                </div>

                <div class="input-container">
                    <div id="simpleInputs" class="input-group">
                        <label>Target Level (1-220)</label>
                        <div class="input-with-icon">
                            <i class="fas fa-chevron-right"></i>
                            <input type="number" id="labelInput" placeholder="Enter level..." oninput="retrieveCost()">
                        </div>
                    </div>

                    <div id="rangeInputs" class="input-row-compact" style="display:none;">
                        <div class="input-group">
                            <label>Starting Level</label>
                            <input type="number" id="startLevelInput" placeholder="1" oninput="retrieveCost()">
                        </div>
                        <div class="input-group">
                            <label>Ending Level</label>
                            <input type="number" id="endLevelInput" placeholder="100" oninput="retrieveCost()">
                        </div>
                    </div>
                </div>

                <div class="settings-footer">
                    <label class="toggle-switch">
                        <input type="checkbox" id="displayModeCheckbox" onchange="updateDisplayMode()">
                        <span class="slider"></span>
                        <span class="toggle-label">Abbreviate numbers (K, M, B)</span>
                    </label>
                </div>
            </section>

            <div class="results-container">
                <section class="card hero-card primary-hero">
                    <div class="hero-content">
                        <label id="labelLeft">LEVEL COST</label>
                        <div class="value-display">
                            <span id="resultLeft">0</span>
                        </div>
                        <div id="subLeft" class="sub-value">Current Level Only</div>
                    </div>
                </section>

                <section class="card hero-card secondary-hero">
                    <div class="hero-content">
                        <label id="labelRight">TOTAL INVESTMENT</label>
                        <div class="value-display">
                            <span id="resultRight">0</span>
                        </div>
                        <div id="subRight" class="sub-value">Accumulated Cost</div>
                    </div>
                </section>
            </div>

            <section class="card table-card">
                <div class="card-header">
                    
                    <h2>Cost Breakdown</h2>
                </div>
                <div id="tableResult" class="table-container">
                    <div class="empty-state">Enter a level to view detailed costs</div>
                </div>
            </section>
        </div>
    </main>

    <script src="../../navigation.js"></script>
    <script src="script.js"></script>
    <script>
        loadShell("Level Calculator", "none");
        setInterval(() => {
            const currentDate = new Date();
            const dateInput = document.getElementById('current-date');
            if(dateInput) dateInput.value = currentDate.toISOString().slice(0, 16);
        }, 1000);
    </script>
</body>
</html>
