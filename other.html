<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other shit — Coming soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
    <link rel="stylesheet" href="MainStyle.css">
    <style>
        /* "Other" uses the teal accent as its signature here */
        .soon { --c: var(--accent-2); }

        .other-wrapper {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: auto;
            padding: 0 20px;
            animation: fadeUp 0.7s ease both;
        }

        .other-header {
            text-align: center;
            margin-bottom: 48px;
        }
        .other-header h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .other-header .accent {
            background: linear-gradient(120deg, var(--accent-2), #6fe3d8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .other-header p {
            margin: 0;
            color: var(--text-dim);
            font-size: 1.05rem;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 48px;
        }

        .project-card {
            display: flex;
            flex-direction: column;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px 28px;
            text-decoration: none;
            color: var(--text-main);
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
            transition: var(--transition);
        }
        .project-card:hover {
            border-color: var(--accent-2);
            box-shadow: 0 8px 40px rgba(46, 196, 182, 0.2);
            transform: translateY(-4px);
        }

        .project-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 56px; height: 56px;
            border-radius: 16px;
            background: color-mix(in srgb, var(--accent-2) 16%, transparent);
            color: var(--accent-2);
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .project-card h2 {
            margin: 0 0 10px;
            font-size: 1.25rem;
            font-weight: 700;
        }
        .project-card p {
            margin: 0 0 20px;
            color: var(--text-dim);
            font-size: 0.95rem;
            line-height: 1.6;
            flex: 1;
        }

        .project-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--accent-2);
            font-size: 0.9rem;
            font-weight: 600;
        }
        .project-link i { transition: transform 0.25s ease; }
        .project-card:hover .project-link i { transform: translateX(4px); }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 13px 26px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-btn:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
            box-shadow: 0 0 18px rgba(46, 196, 182, 0.25);
        }
        .back-btn i { transition: transform 0.25s ease; }
        .back-btn:hover i { transform: translateX(-5px); }
    </style>
</head>
<body class="soon">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <main class="hero">
        <div class="other-wrapper">
            <div class="other-header">
                <h1><span class="accent">Other</span> stuff</h1>
                <p>Experiments, games, and things that don't fit anywhere else.</p>
            </div>

            <div class="projects-grid">
                <a href="OTHER/AetherSlop/index.html" class="project-card">
                    <div class="project-icon"><i class="fa-solid fa-city"></i></div>
                    <h2>AetherSlop</h2>
                    <p>Clicker/Idle city builder made with Claude Mythos to test out it's capabilities</p>
                    <span class="project-link">Play <i class="fa-solid fa-arrow-right"></i></span>
                </a>
            </div>

            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
        </div>
    </main>
</body>
</html>
