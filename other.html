<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Other shit — Coming soon</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.0/css/all.min.css">
    <link rel="stylesheet" href="MainStyle.css">
    <style>
        /* "Other" uses the teal accent as its signature here */
        .soon { --c: var(--accent-2); }

        .soon-card {
            position: relative;
            z-index: 1;
            max-width: 560px;
            margin: auto;
            text-align: center;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 56px 40px;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.7s ease both;
        }

        .soon-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 88px; height: 88px;
            border-radius: 24px;
            background: color-mix(in srgb, var(--accent-2) 16%, transparent);
            color: var(--accent-2);
            font-size: 2.4rem;
            margin-bottom: 28px;
            animation: float 3.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }

        .soon-card h1 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 5vw, 2.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .soon-card .accent {
            background: linear-gradient(120deg, var(--accent-2), #6fe3d8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .soon-card p {
            margin: 0 auto 32px;
            max-width: 420px;
            color: var(--text-dim);
            font-size: 1.05rem;
            line-height: 1.6;
        }

        /* Animated progress shimmer */
        .progress {
            height: 8px;
            background: #16161d;
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 36px;
        }
        .progress span {
            display: block;
            height: 100%;
            width: 35%;
            border-radius: 50px;
            background: linear-gradient(90deg, var(--accent-2), #6fe3d8);
            position: relative;
        }
        .progress span::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
            animation: shimmer 1.8s infinite;
        }
        @keyframes shimmer {
            from { transform: translateX(-100%); }
            to   { transform: translateX(250%); }
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-main);
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 13px 26px;
            font-size: 0.95rem;
            font-weight: 600;
            transition: var(--transition);
        }
        .back-btn:hover {
            border-color: var(--accent-2);
            color: var(--accent-2);
            box-shadow: 0 0 18px rgba(46, 196, 182, 0.25);
        }
        .back-btn i { transition: transform 0.25s ease; }
        .back-btn:hover i { transform: translateX(-5px); }
    </style>
</head>
<body class="soon">
    <div class="glow glow-1"></div>
    <div class="glow glow-2"></div>

    <main class="hero">
        <div class="soon-card">
            <div class="soon-badge"><i class="fa-solid fa-screwdriver-wrench"></i></div>
            <h1>Coming <span class="accent">soon</span></h1>
            <p>This corner is still under construction. Something will land here eventually.</p>
            <div class="progress"><span></span></div>
            <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to home</a>
        </div>
    </main>
</body>
</html>
